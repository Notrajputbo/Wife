<!DOCTYPE html>
<html>
<head>

<title>For My Beautiful Wife ❤️</title>

<style>

body{
margin:0;
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

h1{
font-size:45px;
color:pink;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px pink;}
to{text-shadow:0 0 30px red;}
}

img{
width:230px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px pink;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:15px;
background:pink;
color:black;
margin-top:20px;
}

.heart{
position:fixed;
top:-10px;
font-size:22px;
color:red;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(100vh);}
}

</style>

</head>

<body>

<h1>I Love You ❤️</h1>

<p>You Are My Life 💕</p>

<img id="photo" src="1.jpg">

<br>

<button onclick="love()">Click My Love 💘</button>

<p id="message"></p>

<audio autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let photos=["1.jpg","2.jpg","3.jpg"];
let index=0;

setInterval(function(){
index++;
if(index>=photos.length) index=0;
document.getElementById("photo").src=photos[index];
},3000);

function love(){
document.getElementById("message").innerHTML="You are the most beautiful part of my life ❤️";
}

setInterval(function(){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},300);

</script>

</body>

</html>
